<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ TP7 AWA – Événements 2026 ✨</title>

  <!-- Retro / whimsical fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;900&family=VT323&display=swap" rel="stylesheet">

  <style>
    /* ── Global reset & starfield bg ─────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:    #ff79c6;
      --purple:  #bd93f9;
      --cyan:    #8be9fd;
      --yellow:  #f1fa8c;
      --green:   #50fa7b;
      --orange:  #ffb86c;
      --bg:      #0d0d1a;
      --panel:   rgba(255,255,255,0.05);
      --border:  rgba(255,255,255,0.12);
      --text:    #f8f8f2;
      --muted:   #a0a0c0;
      --pixel:   'Press Start 2P', monospace;
      --body:    'Nunito', sans-serif;
      --vt:      'VT323', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      overflow-x: hidden;
      cursor: none; /* custom cursor */
    }

    /* ── Starfield canvas (behind everything) ─────────────── */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Sparkle cursor ───────────────────────────────────── */
    #cursor {
      position: fixed;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 8px var(--pink), 0 0 20px var(--purple);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: background 0.2s;
    }
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      font-size: 14px;
      animation: sparkle-fade 0.8s ease-out forwards;
      transform: translate(-50%, -50%);
    }
    @keyframes sparkle-fade {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -150%) scale(0.3); }
    }

    /* ── Main app wrapper ─────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 0 0 80px 0;
    }
  </style>
</head>

<body>
  <!-- Starfield -->
  <canvas id="starfield"></canvas>
  <!-- Custom cursor -->
  <div id="cursor"></div>

  <div id="app"></div>

  <!-- Sparkle cursor + starfield scripts -->
  <script>
    /* ── Starfield ── */
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    function initStars(n = 180) {
      stars = Array.from({ length: n }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3,
        speed: Math.random() * 0.3 + 0.05,
        twinkle: Math.random() * Math.PI * 2,
      }));
    }
    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.twinkle += 0.04;
        s.y += s.speed;
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
        const alpha = 0.5 + 0.5 * Math.sin(s.twinkle);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', () => { resizeCanvas(); initStars(); });
    resizeCanvas(); initStars(); drawStars();

    /* ── Sparkle cursor ── */
    const cursor = document.getElementById('cursor');
    const sparkleChars = ['✦','✧','⋆','*','✺','✹','✸','✷'];
    let lastSparkle = 0;
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
      const now = Date.now();
      if (now - lastSparkle > 60) {
        lastSparkle = now;
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = sparkleChars[Math.floor(Math.random() * sparkleChars.length)];
        const colors = ['#ff79c6','#bd93f9','#8be9fd','#f1fa8c','#50fa7b','#ffb86c'];
        s.style.color = colors[Math.floor(Math.random() * colors.length)];
        s.style.left = e.clientX + (Math.random() * 20 - 10) + 'px';
        s.style.top  = e.clientY + (Math.random() * 20 - 10) + 'px';
        s.style.fontSize = (10 + Math.random() * 12) + 'px';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 800);
      }
    });
  </script>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
